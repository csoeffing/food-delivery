# https://taskfile.dev

version: '3'
dotenv: ['.env']
vars:
  API_TOKEN:
    sh: curl -s -X POST http://localhost:8134/api/user/login -d '{"userName":"gwash", "password":"test"}' | jq -r .access_token

tasks:
  user-create:
    cmds:
      - curl -i -X POST http://localhost:8134/api/user/signup -d '{"firstName":"George", "lastName":"Washington", "userName":"gwash", "password":"test", "email":"gwash@gmail.com", "phone":"800-555-1235"}'

  user-form:
    cmds:
      - sh curl/user-form.sh
  
  user-login:
    cmds:
      - curl -X POST http://localhost:8134/api/user/login -d '{"userName":"gwash", "password":"test"}'

  user-get:
    cmds:
      - "curl -i -H 'Authorization: Bearer {{ .API_TOKEN }}' -X GET http://localhost:8134/api/user/2"

  psql:
    cmds:
      - echo $PSQL_HOST
      - psql 'postgresql://{{ .PSQL_USER }}:{{ .PSQL_PASS }}@{{ .PSQL_HOST }}:5432/fooddelivery'

  robot:
    dir: '{{.TASKFILE_DIR}}/robot'
    cmds:
      - robot --outputdir ../results . 

  test:
    dir: '{{.TASKFILE_DIR}}/goapp'
    cmds:
      - grc go test -v ./...

  db-reset:
   cmds:
     - PGPASSWORD={{ .PSQL_PASS }} psql -h {{ .PSQL_HOST }} -U {{ .PSQL_USER }} -f database.sql