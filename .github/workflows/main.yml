name: Go
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
      - name: Install Task
        uses: arduino/setup-task@v2
      - name: Install dependencies
        run: go get .
        working-directory: goapp
      - name: Build
        run: go build -v ./...
        working-directory: goapp
      - name: Test with the Go CLI
        run: go test
        working-directory: goapp
      #- name: Robot Tests
      #  run: task run-robot
        
